name: Deploy site to GitHub Pages

on:
  # Deploy on every push to the working branch...
  push:
    branches:
      - claude/website-setup-github-0mscyc
      - main
  # ...and allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions needed to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns on GitHub Pages automatically (no manual
        # toggle in repo Settings needed) the first time this runs.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the static site.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
